<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="theme-color" content="#0a0a0b"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="EXPO"/>
  <link rel="manifest" href="/manifest.json"/>
  <link rel="apple-touch-icon" href="/icon-192.png"/>
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png"/>
  <title>EXPO</title>
  <link rel="stylesheet" href="/nord-fonts.css"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#000;font-family:'Nord','DM Sans',system-ui,sans-serif;-webkit-font-smoothing:antialiased;color:#fff}
    ::selection{background:#39BDFF30;color:#fff}
    ::-webkit-scrollbar{width:6px;height:6px}
    ::-webkit-scrollbar-track{background:#0a0a0a}
    ::-webkit-scrollbar-thumb{background:#1a1a1e;border-radius:3px}
    ::-webkit-scrollbar-thumb:hover{background:#39BDFF40}
    input,select,textarea{font-family:'Nord','DM Sans',system-ui,sans-serif}

    /* Mobile responsive */
    @media(max-width:768px){
      nav::-webkit-scrollbar{display:none}
      table{display:block;overflow-x:auto;-webkit-overflow-scrolling:touch;white-space:nowrap}
      table th,table td{padding:8px 6px!important;font-size:11px!important}
    }
    @media(max-width:480px){
      header nav button span{font-size:11px!important}
      header nav button{padding:4px 8px!important}
    }
  </style>
</head>
<body><div id="root"></div><script type="module" src="/src/main.jsx"></script></body>
</html>
